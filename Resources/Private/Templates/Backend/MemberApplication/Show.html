<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>

<f:section name="main">
    <div class="module-member-application-detail">
        <h2>{application.applicantName}</h2>

        <dl class="tx-member-detail-list">
            <dt>Email</dt>
            <dd>{application.email}</dd>

            <dt>Status</dt>
            <dd>{application.status}</dd>

            <dt>Motivation</dt>
            <dd>
                <f:if condition="{application.motivation}">
                    <f:then>{application.motivation}</f:then>
                    <f:else>—</f:else>
                </f:if>
            </dd>

            <f:if condition="{application.member}">
                <dt>Associated Member</dt>
                <dd>{application.member.name}</dd>
            </f:if>
        </dl>

        <div class="tx-member-actions">
            <f:if condition="{application.isPending}">
                <f:link.action action="approve"
                               arguments="{application: application}"
                               class="btn btn-success">
                    Approve
                </f:link.action>
                <f:link.action action="reject"
                               arguments="{application: application}"
                               class="btn btn-danger">
                    Reject
                </f:link.action>
            </f:if>
            <f:if condition="{application.isApproved}">
                <f:link.action action="activate"
                               arguments="{application: application}"
                               class="btn btn-primary">
                    Activate Member
                </f:link.action>
            </f:if>
            <f:link.action action="index" class="btn btn-default">
                Back to list
            </f:link.action>
        </div>
    </div>
</f:section>

</html>
